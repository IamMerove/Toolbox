name: CI Toolbox

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  quality-and-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync --frozen

      - name: Linting (Ruff)
        run: uv run ruff check .

      - name: Run Tests (Pytest)
        run: PYTHONPATH=. uv run pytest

      - name: Scan for secrets with TruffleHog
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          extra_args: --exclude-paths .github/exclude-patterns.txt --results=verified --fail
          # Ou sans --fail si tu veux juste alerter sans casser le build